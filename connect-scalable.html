<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Let’s Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
  :root { 
    --ai-blue:#0073E5; 
    --ai-green:#22C55E; 
    --ai-light:#E1F1FD; 
    --ai-ink:#15182F; 
  }

  body {
    margin:0; 
    font-family:"Open Sans",sans-serif; 
    color:var(--ai-ink);
    background:url("web-trees&lake4.jpg") no-repeat center center fixed; 
    background-size:cover;
    min-height:100vh; 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    padding:20px;
  }

  .card-wrapper{
    width:100%;
    max-width:460px;
    margin:auto;
  }
    
  .logo-bar{
  width:100%;
  margin-bottom:10px;
  text-align:center;
}

  .logo-bar img{
    width:100%;
    height:auto;
  }
  
  .card { 
    background:var(--ai-light); 
    border-radius:24px; 
    box-shadow:0 12px 24px rgba(0,115,229,.2);
    padding:36px; 
    text-align:center; 
    width:100%; 
    max-width:460px; 
    position: relative;
  }

  /* Step containers */
  #shareStep, 
  #connectForm {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #connectForm.hidden {
    display: none;
  }

  h1, h2 {
    color: var(--ai-blue);
    margin: 0 0 10px;
  }

  p { margin:0 0 20px; }

  input, button {
    width:100%; 
    padding:12px; 
    margin:8px 0; 
    border-radius:10px; 
    font-family:"Open Sans";
  }

  button {
    background:var(--ai-blue); 
    color:#fff; 
    border:none; 
    font-weight:600; 
    cursor:pointer; 
    transition:.2s;
  }

  button:hover {
    background:var(--ai-green);
  }

  /* Smooth fade animation for step switch */
  .fade {
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .fade.show {
    opacity: 1;
  }
</style>

</head>
<body

<div class="card-wrapper">

  <div class="logo-bar">
    <img src="AI-solid-logos.png" alt="Associated Industries Logos">
  </div>
  
  <main class="card">
    <!-- Step 1: Share employee’s Info first -->
    <div id="shareStep">
     <img id="employeeQR"
       src=""
       alt="QR Code"
       style="width:160px;height:160px;margin:0 auto 20px;display:block;">
      
    <h1>Let’s Connect</h1>
   
    <img id="employeePhoto"
     src=""
     alt="Employee Photo"
     style="width:180px;height:180px;object-fit:cover;object-position:center 20%;border-radius:20px;margin:10px auto 20px;display:block;box-shadow:0 8px 20px rgba(0,0,0,0.15);">                
      
      <p>Save <span class="employee-name">Loading...</span>’s contact first, then share your info.</p>
<button id="saveEmployee">Save <span class="employee-name">Loading...</span>’s Info</button>
    </div>

    <!-- Step 2: Collect visitor info (emails Robert) -->
    <form id="connectForm" class="hidden" action="https://eoz21saxgb2b1vg.m.pipedream.net" method="POST">
      <h2>Now share your info</h2>
      <p><span class="employee-name"></span> will reach out soon.</p>
      <input type="hidden" name="_subject" id="subjectField">
      <input type="hidden" name="slug" id="slugField">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <input type="tel" name="phone" placeholder="Your Phone" required>
      <input type="text" name="company" placeholder="Company (optional)">
      <button type="submit">Send Info</button>
    </form>
 </main>

</div>

 <script>

// Get slug from URL
const urlParams = new URLSearchParams(window.location.search);
const slug = urlParams.get("slug");
// Show quick name from slug
if (slug) {
  const quickName = slug
    .split("-")
    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
    .join(" ");

  document.querySelectorAll(".employee-name").forEach(el => {
    el.textContent = quickName;
  });
}
// Create QR code for this employee page
const qr = document.getElementById("employeeQR");

if (qr && slug) {
  const url = `https://skyfordscissorhands.github.io/connect/connect-scalable.html?slug=${slug}`;
  qr.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
}   

let employeeName = "Employee Name";
let vcfFile = "default-employee.vcf";

const saveBtn = document.getElementById("saveEmployee");
const shareStep = document.getElementById("shareStep");
const formEl = document.getElementById("connectForm");

// Disable button until employee loads
saveBtn.disabled = true;

async function loadEmployee() {
  if (!slug) {
    saveBtn.disabled = false;
    return;
  }

  const res = await fetch(`https://eosi1gbo0ej0dm9.m.pipedream.net?slug=${encodeURIComponent(slug)}`);
  const data = await res.json();

  employeeName = data.full_name || "Employee Name";
  vcfFile = data.vcf_download_link || "default-employee.vcf";

  const photo = document.getElementById("employeePhoto");
  if (photo) {
    photo.src = `employee-photos/${slug}.jpg`;
  }

  const slugField = document.getElementById("slugField");
  if (slugField) slugField.value = slug;

  // Update name on page
  document.querySelectorAll(".employee-name").forEach(el => {
    el.textContent = employeeName;
  });

  // Update email subject
  const subjectField = document.getElementById("subjectField");
  if (subjectField) {
    subjectField.value = `New contact for ${employeeName}`;
  }

  // Enable button once ready
  saveBtn.disabled = false;
}

const photo = document.getElementById("employeePhoto");
if (photo && slug) {
  photo.src = `employee-photos/${slug}.jpg`;
}
   
loadEmployee();

// Step 1 → Download employee VCF → Reveal form
saveBtn.addEventListener("click", () => {
  window.location.href = vcfFile;

  setTimeout(() => {
    shareStep.classList.add("fade");
    setTimeout(() => {
      shareStep.style.display = "none";
      formEl.style.display = "flex";
      formEl.classList.add("fade", "show");
    }, 400);
  }, 800);
});

// Step 2 → Submit form → Show thank-you → Redirect
formEl.addEventListener("submit", (e) => {
  e.preventDefault();
  const formData = new FormData(formEl);

  fetch(formEl.action, {
    method: "POST",
    body: formData,
    headers: { Accept: "application/json" }
  })
  .then(() => {
    formEl.innerHTML = `
      <div style="text-align:center;">
        <h2>Thanks for connecting!</h2>
        <p>Your info has been sent to ${employeeName}.</p>
      </div>`;
    setTimeout(() => {
      window.location.href = "https://associated-industries.com/";
    }, 2000);
  })
  .catch(() => {
    formEl.innerHTML = "<p>Something went wrong. Please try again.</p>";
  });
});

</script>
</body>
</html>
